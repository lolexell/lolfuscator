<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>lolfuscator 9.0</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="key-menu" id="key-menu">
  <div class="key-window">
    <div class="key-header">
      <span class="key-title">lolfuscator key</span>
    </div>
    <div class="key-tabs">
      <button class="key-tab key-tab-active" id="tab-login">Login</button>
    </div>
    <div class="key-body">
      <p class="key-hint">contact lolexell for key</p>
      <input id="username" class="key-input" placeholder="username" spellcheck="false">
      <input id="license" class="key-input" placeholder="key" spellcheck="false">
      <button id="key-unlock">Continue</button>
      <p id="key-status" class="key-status">waiting for key</p>
    </div>
  </div>
</div>

<main class="page">
  <header class="header">
    <div class="logo">
      <span class="logo-main">lolfuscator</span><span class="logo-dot">9.0</span>
    </div>
    <div class="subtitle">Lua xor / base64 / VM obfuscator</div>
  </header>

  <div id="dashboard"></div>

  <section class="card" id="obf-window">
    <div class="card-header glass" id="obf-header">
      <div class="win-dots">
        <span class="dot dot-red"></span>
        <span class="dot dot-yellow"></span>
        <span class="dot dot-green"></span>
      </div>
      <span class="card-title">obfuscator</span>
      <span class="card-status">🟢</span>
    </div>

    <div class="card-body glass">
      <div class="column">
        <div class="row-label">
          <span class="label">Input</span>
          <span class="hint">your Lua code</span>
        </div>
        <textarea id="in" spellcheck="false" placeholder="print(&quot;hello, lolfuscator 9.0&quot;)"></textarea>
      </div>

      <div class="column center">
        <button id="btn">Obfuscate</button>
        <p class="note">Single xor + VM.</p>
        <p id="status" class="status">idle</p>
      </div>

      <div class="column">
        <div class="row-label">
          <span class="label">Output</span>
          <span class="hint">obfuscated Lua</span>
        </div>
        <textarea id="out" spellcheck="false" readonly></textarea>

        <div class="row-label" style="margin-top:8px;">
          <span class="label">Deobfuscate</span>
          <span class="hint">paste lolfuscator code</span>
        </div>
        <textarea id="deobf-input" spellcheck="false" placeholder="paste lolfuscator 9.0 obfuscated code here"></textarea>
        <button id="deobf-btn">Deobfuscate</button>
        <textarea id="deobf-output" spellcheck="false" readonly placeholder="original Lua will appear here"></textarea>
      </div>
    </div>
  </section>
</main>

<script src="obf.js"></script>
</body>
</html>
