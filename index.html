<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>lolfuscator 9.0</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="snow"></div>
<div class="snowflakes" aria-hidden="true">
  <div class="snowflake">✦</div>
  <div class="snowflake">✧</div>
  <div class="snowflake">✦</div>
  <div class="snowflake">✧</div>
  <div class="snowflake">✦</div>
  <div class="snowflake">✧</div>
</div>

<div class="key-menu" id="key-menu">
  <div class="key-window">
    <div class="key-header">
      <span class="key-title">lolfuscator 9.0 access</span>
    </div>
    <div class="key-tabs">
      <button class="key-tab key-tab-active" id="tab-login">Login</button>
      <button class="key-tab" id="tab-register">Register</button>
    </div>
    <div class="key-body">
      <p class="key-hint">contact lolexell for key</p>
      <input id="license" class="key-input" placeholder="key" spellcheck="false">
      <input id="username" class="key-input" placeholder="username (for register)" spellcheck="false">
      <button id="key-unlock">Continue</button>
      <p id="key-status" class="key-status">waiting for key</p>
    </div>
  </div>
</div>

<main class="page">
  <header class="header">
    <div class="logo">
      <span class="logo-main">lolfuscator</span><span class="logo-dot">9.0</span>
    </div>
    <div class="subtitle">Lua triple xor / base64 / VM obfuscator</div>
  </header>

  <section class="card">
    <div class="card-header glass">
      <span class="card-title">script.lua</span>
      <span class="card-status">ready</span>
    </div>

    <div class="card-body glass">
      <div class="column">
        <div class="row-label">
          <span class="label">Input</span>
          <span class="hint">your Lua code</span>
        </div>
        <textarea id="in" spellcheck="false" placeholder="print(&quot;hello, lolfuscator 9.0&quot;)"></textarea>
      </div>

      <div class="column center">
        <button id="btn">Obfuscate</button>
        <p class="note">Triple xor + VM. Key required (login/register).</p>
        <p id="status" class="status">idle</p>
      </div>

      <div class="column">
        <div class="row-label">
          <span class="label">Output</span>
          <span class="hint">obfuscated Lua</span>
        </div>
        <textarea id="out" spellcheck="false" readonly></textarea>
      </div>
    </div>
  </section>
</main>

<script src="obf.js"></script>
</body>
</html>
