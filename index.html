<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>lolfuscator 4.0</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="snow-layer"></div>

<main class="page">
  <header class="header">
    <div class="logo">
      <span class="logo-main">lolfuscator</span><span class="logo-dot">4.0</span>
    </div>
    <div class="subtitle"></div>
  </header>

  <section class="card">
    <div class="card-header">
      <span class="card-title">script.lua</span>
      <span class="card-status">online</span>
    </div>

    <div class="card-body">
      <div class="column">
        <div class="row-label">
          <span class="label">Input</span>
          <span class="hint">your Lua code</span>
        </div>
        <textarea id="in" spellcheck="false" placeholder="print(&quot;hello, lolfuscator 4.0&quot;)"></textarea>
      </div>

      <div class="column center">
        <button id="btn">Obfuscate</button>
        <label class="check">
          <input type="checkbox" id="cmt" checked>
          <span>add lolfuscator header</span>
        </label>
        <p class="note">Toy protection only. Use in sandbox.</p>
        <p id="status" class="status">idle</p>
      </div>

      <div class="column">
        <div class="row-label">
          <span class="label">Output</span>
          <span class="hint">obfuscated Lua</span>
        </div>
        <textarea id="out" spellcheck="false" readonly></textarea>
      </div>
    </div>
  </section>
</main>

<script src="obf.js"></script>
</body>
</html>
